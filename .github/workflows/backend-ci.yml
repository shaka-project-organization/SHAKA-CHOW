name: Backend CI/CD — Build, Push & Deploy
permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

env:
  AWS_REGION:       ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID:   ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPO:         shakachow-backend
  IMAGE_TAG:        ${{ github.sha }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  test:
    name: Install & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          token:      ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Node.js dependencies
        working-directory: backend
        run: npm install
      - name: Run linter
        working-directory: backend
        run: npm run lint --if-present

      - name: Run test suite
        working-directory: backend
        run: npm test --if-present
        env:
          NODE_ENV:            test
          JWT_SECRET:          ci-only-not-real-jwt-secret
          JWT_REFRESH_SECRET:  ci-only-not-real-refresh-secret
          MONGODB_URI:         mongodb://localhost:27017/shakachow_test

      - name: Commit package-lock.json if missing
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: backend
        run: |
          if ! git ls-files --error-unmatch package-lock.json 2>/dev/null; then
            echo "package-lock.json not tracked — committing now"
            git config user.name  "shaka"
            git config user.email "shakajimoh23@gmail.com"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git add package-lock.json
            git commit -m "chore: add backend package-lock.json [skip ci]"
            git push
            echo "✅ package-lock.json committed"
          else
            echo "package-lock.json already tracked — skipping"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}

  build-and-push:
    name: Build Docker Image & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_uri: ${{ steps.set-output.outputs.image_uri }}

    steps:
      # Fresh runner for this job — must checkout again.
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Set AWS credentials from GitHub Secrets.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # Get a temporary ECR authentication token and run docker login.
    
      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file:    ./backend/Dockerfile
          push:    true
          tags: |
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:latest
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Export image URI as job output
        id: set-output
        run: |
          echo "image_uri=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT
      
      - name: Verify image URI output
        run: |
          IMAGE_URI=$(cat $GITHUB_OUTPUT | grep image_uri | cut -d= -f2)
          echo "Image URI output: $IMAGE_URI"
          if [ -z "$IMAGE_URI" ]; then
            echo "❌ Error: image_uri output is empty"
            exit 1
          fi

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}
          format:    table
          exit-code: '0'
          severity:  'HIGH,CRITICAL'

      - name: Write build summary
        run: |
          echo "### ✅ Backend Image Pushed to ECR" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY


  deploy:
    name: Deploy Backend to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://shakachow.engrshakacloud.online/api/health

    steps:
      # Fresh runner — must checkout again to access k8s/ manifests.
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Re-authenticate with AWS on this new runner.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # Install kubectl CLI. Version matches EKS cluster version.
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Connect kubectl to EKS cluster
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name   ${{ env.EKS_CLUSTER_NAME }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespaces/namespaces.yaml
          kubectl apply -f k8s/configmaps/backend-config.yaml  --namespace shakachow
          kubectl apply -f k8s/backend/deployment.yaml          --namespace shakachow
          kubectl apply -f k8s/backend/service.yaml             --namespace shakachow
          kubectl apply -f k8s/backend/hpa.yaml                 --namespace shakachow

      - name: Update backend deployment with new image
        run: |
          IMAGE_URI="${{ needs.build-and-push.outputs.image_uri }}"
          if [ -z "$IMAGE_URI" ]; then
            echo "❌ Error: image_uri output is empty"
            exit 1
          fi
          echo "Deploying image: $IMAGE_URI"
          kubectl set image deployment/shakachow-backend \
            backend=$IMAGE_URI \
            --namespace shakachow

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/shakachow-backend \
            --namespace shakachow \
            --timeout=300s

      # Confirm pod health after rollout.
      - name: Verify deployment health
        run: |
          echo "=== Pod status ==="
          kubectl get pods \
            --namespace shakachow \
            --selector app=shakachow-backend \
            --output wide
          echo "=== Deployment status ==="
          kubectl get deployment shakachow-backend --namespace shakachow

      - name: Rollback on failure
        if: failure()
        run: |
          echo "🚨 Backend deployment failed — rolling back"
          kubectl rollout undo deployment/shakachow-backend --namespace shakachow
          kubectl rollout status deployment/shakachow-backend --namespace shakachow

      - name: Write deployment summary
        if: success()
        run: |
          echo "### 🚀 Backend Deployed to EKS" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ needs.build-and-push.outputs.image_uri }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Health check** | https://shakachow.engrshakacloud.online/api/health |" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
