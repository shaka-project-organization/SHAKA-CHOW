
apiVersion: apps/v1
kind: Deployment

metadata:
  name: shakachow-frontend
  namespace: shakachow
  labels:
    app: shakachow-frontend
    tier: frontend
    environment: production

spec:

  replicas: 2


  selector:
    matchLabels:
      app: shakachow-frontend

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0

      maxSurge: 1


  template:
    metadata:
      labels:
        app: shakachow-frontend
        tier: frontend

    spec:
      terminationGracePeriodSeconds: 30


      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: shakachow-frontend

      containers:
        - name: frontend
          # Container name — used in logs and kubectl set image.

          image: 467508858835.dkr.ecr.us-east-1.amazonaws.com/shakachow-frontend:latest
   
   
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 80
   
   
              protocol: TCP

          resources:
            requests:
              memory: "32Mi"

              cpu: "50m"

            limits:
              memory: "64Mi"


              cpu: "200m"




          readinessProbe:
            httpGet:
              path: /health
              # nginx.conf has: location /health { return 200 'ok'; }
              port: 80
            initialDelaySeconds: 5
            # Nginx starts fast — 5 seconds is plenty.
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5 && nginx -s quit"]

