

apiVersion: v1
kind: Service   


metadata:
  name: shakachow-backend-svc
 
  namespace: shakachow

  labels:
    app: shakachow-backend
    tier: backend

spec:

  type: ClusterIP
 

  selector:
    app: shakachow-backend

  ports:
    - name: http
      protocol: TCP

      port: 80
  

      targetPort: 5000

