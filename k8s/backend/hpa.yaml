# ============================================================
# FILE: k8s/backend/hpa.yaml
# PURPOSE: Automatically scales the number of backend pods
# based on CPU utilisation.
#
# HOW HPA WORKS:
# Every 15 seconds, HPA reads CPU metrics from metrics-server.
# If average CPU across all backend pods exceeds 70%:
#   → Scale UP: add more pods (up to maxReplicas)
# If average CPU drops below ~50% for several minutes:
#   → Scale DOWN: remove pods (down to minReplicas)
#
# EXAMPLE:
#   2 pods running, both at 90% CPU (traffic spike)
#   HPA calculation: 90% / 70% target = 1.28 ratio
#   New replica count: ceil(2 * 1.28) = 3 pods
#   HPA scales to 3 pods.
# ============================================================

# autoscaling/v2 supports multiple metrics (CPU + memory + custom).
# autoscaling/v1 only supports CPU.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: shakachow-backend-hpa
  namespace: shakachow
  labels:
    app: shakachow-backend

spec:

  # scaleTargetRef: which workload to scale.
  # HPA adjusts the "replicas" field of this Deployment.
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shakachow-backend
    # Must match the Deployment name exactly.

  minReplicas: 2
  # Never scale below 2 replicas.
  # With 2 pods across 2 AZs, we always have one pod
  # per AZ — high availability is maintained even at minimum scale.

  maxReplicas: 8
  # Maximum 8 pods. With t3.medium nodes (2 vCPU, 4GB each),
  # 8 backend pods at 500m CPU = 4 full CPUs = 2 full nodes.
  # A 3rd node would autoscale if this maximum is hit regularly.

  # metrics: the signals HPA uses to make scaling decisions.
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
          # Target 70% average CPU across all backend pods.
          # 70% is the standard recommendation — gives headroom
          # for traffic spikes before new pods become ready
          # (pod startup takes 10-20 seconds).

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
          # Also scale on memory. If pods average 80%+ memory
          # (200MB+ of our 256MB limit), add more pods.
          # Memory-based scaling helps with MongoDB result set
          # caching and large payload processing.

  # behavior: controls the speed of scaling up and down.
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      # Wait 60 seconds before scaling up after the last scale event.
      # Prevents thrashing — if a spike lasts 5 seconds, don't
      # immediately spin up 4 pods just to remove them 30 seconds later.
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
          # Add at most 2 pods per 60-second window.
          # Prevents an extreme traffic spike from instantly
          # requesting 20 pods that would overwhelm your node capacity.
    scaleDown:
      stabilizationWindowSeconds: 300
      # Wait 5 minutes before scaling down.
      # Much more conservative than scale-up to avoid removing pods
      # during temporary traffic lulls that might spike again soon.
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
          # Remove at most 1 pod every 2 minutes when scaling down.
          # Slow, gradual scale-down prevents removing too many
          # pods before you can confirm traffic has truly decreased.
