
apiVersion: apps/v1
kind: Deployment   

metadata:
  name: shakachow-backend

  namespace: shakachow

  labels:
    app: shakachow-backend
    tier: backend
    environment: production

spec:

  replicas: 2

  selector:
    matchLabels:
      app: shakachow-backend

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:
    metadata:
      labels:
        app: shakachow-backend
        tier: backend
       
        version: "1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/api/health"

    spec:
      # How long Kubernetes waits for a pod to terminate gracefully
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          # maxSkew=1: the difference in pod count between any
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule

          labelSelector:
            matchLabels:
              app: shakachow-backend

      containers:
        - name: backend
          # Container name used in: kubectl logs <pod> -c backend

          image: 467508858835.dkr.ecr.us-east-1.amazonaws.com/shakachow-backend:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: backend-config

            - secretRef:
                name: backend-secret
          resources:
            requests:
              memory: "128Mi"

              cpu: "100m"
            limits:
              memory: "256Mi"

              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /api/health

              port: 5000
            initialDelaySeconds: 15
            # Wait 15 seconds after container start before first check.
            # Gives Node.js and Mongoose time to fully initialise.
            periodSeconds: 20
            # Check every 20 seconds.
            failureThreshold: 3
            # After 3 consecutive failures, restart the container.
            # 3 * 20s = 60 seconds of failures before restart.

          # readinessProbe: Kubernetes checks this to decide whether
 
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            # Start checking after 10 seconds.
            periodSeconds: 10
            # Check every 10 seconds.
            failureThreshold: 3
            # After 3 failures, stop sending traffic to this pod.
            successThreshold: 1
            # One successful check re-adds the pod to traffic rotation.

          startupProbe:
            httpGet:
              path: /api/health
              port: 5000
            failureThreshold: 30
            periodSeconds: 5

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

